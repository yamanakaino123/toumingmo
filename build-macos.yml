name: Build macOS Horangi-TTS App
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14  # 完美适配你朋友的Sonoma 14.5系统
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install py2app

      - name: Build App with py2app
        run: |
          python setup.py py2app

      - name: Zip the App
        run: |
          cd dist
          zip -r Horangi-TTS-macOS.zip Horangi-TTS.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Horangi-TTS-macOS
          path: dist/Horangi-TTS-macOS.zip
